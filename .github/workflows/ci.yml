name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
        working-directory: src
      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: src
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        working-directory: src

  eval-runner:
    name: eval-runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install deps
        run: pip install -r requirements-dev.txt
        working-directory: eval-runner
      - name: Lint (ruff)
        run: ruff check .
        working-directory: eval-runner
      - name: Test (pytest)
        run: pytest -q
        working-directory: eval-runner

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Lint (prettier)
        run: npm run lint
        working-directory: web
      - name: Unit tests (Karma headless)
        run: |
          echo "CHROME_BIN=$(which google-chrome)" >> "$GITHUB_ENV"
          npm run test:ci
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web

  compose-smoke:
    name: compose-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so `git describe` can derive the version
      - name: Build and start the stack
        env:
          GIT_COMMIT: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          # Version is git-tag-derived: on a v* tag → clean (v0.4.0 → 0.4.0); on main → pre-release
          # lineage (e.g. 0.3.0-2). The commit SHA is reported separately, so trim git describe's -g<sha>.
          APP_VERSION="$(git describe --tags --always 2>/dev/null | sed -E 's/^v//; s/-g[0-9a-f]+$//')"
          [ -z "$APP_VERSION" ] && APP_VERSION="0.0.0-dev"
          # Deploy channel is git-ref-derived (3.3): a v* tag -> prod, main -> dev. This is the
          # reliable dev/prod discriminator the UI keys off. Upper environments (staging/prod deploy
          # targets) are wired in spec 3.2; here it only needs to flow through to the payload.
          case "$GITHUB_REF" in
            refs/tags/v*) APP_CHANNEL="prod" ;;
            *)            APP_CHANNEL="dev" ;;
          esac
          echo "Building version $APP_VERSION (channel $APP_CHANNEL)"
          export APP_VERSION APP_CHANNEL
          docker compose up -d --build --wait --wait-timeout 300
      - name: Show status
        if: always()
        run: docker compose ps
      - name: End-to-end round trip through the compose network
        run: |
          set -euo pipefail
          resp=$(curl -sf -X POST http://localhost:4240/api/echo \
            -H 'Content-Type: application/json' -d '{"prompt":"ci smoke"}')
          echo "$resp"
          echo "$resp" | grep -q '"output":"ci smoke"'
      - name: Aggregated /version reports every service
        run: |
          set -euo pipefail
          ver=$(curl -sf http://localhost:4241/version)
          echo "$ver"
          echo "$ver" | grep -q '"service":"litmus-ai-api"'
          echo "$ver" | grep -q '"eval-runner"'
          echo "$ver" | grep -q 'PostgreSQL'
          echo "$ver" | grep -q "${GITHUB_SHA}"
          # A real git-derived version was stamped (not the local "0.0.0-dev" default).
          echo "$ver" | grep -qE '"version":"[0-9]+\.[0-9]+\.[0-9]+'
        env:
          GITHUB_SHA: ${{ github.sha }}
      - name: Flat /api/version (SPA-facing) carries the channel through the web proxy
        run: |
          set -euo pipefail
          # Fetched via the web proxy — exactly the path the browser uses (3.3).
          ver=$(curl -sf http://localhost:4240/api/version)
          echo "$ver"
          # Shape, not a literal: a real version + the git-ref-derived channel are present.
          echo "$ver" | grep -qE '"version":"[0-9]+\.[0-9]+\.[0-9]+'
          echo "$ver" | grep -qE '"channel":"(dev|prod)"'
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Playwright e2e against the composed stack
        run: |
          npm ci
          npx playwright install --with-deps chromium
          E2E_BASE_URL=http://localhost:4240 npx playwright test
        working-directory: web
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
