server {
    listen 80;
    server_name _;

    # Proxy API calls to the .NET service by its compose service name.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A heavy synchronous eval run (round-debrief) can outlast nginx's 60s proxy default and
        # 502 at the compose proxy. Give it headroom to match the API's eval-runner timeout (R1
        # interim band-aid; the real fix is async runs). Dev/App Runner serves the SPA same-origin
        # from the API, so this only affects the local compose stack.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
