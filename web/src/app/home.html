<section class="sb-card panel">
  <h1 class="title">LitmusAI</h1>
  <p class="subtitle">Connectivity check — round-trips one prompt through every layer.</p>

  <div class="sb-field">
    <label for="prompt">Prompt</label>
    <input
      id="prompt"
      name="prompt"
      type="text"
      [ngModel]="prompt()"
      (ngModelChange)="prompt.set($event)"
    />
  </div>

  <button
    class="sb-btn sb-btn--primary"
    type="button"
    (click)="run()"
    [disabled]="loading()"
    data-testid="run"
  >
    {{ loading() ? 'Running…' : 'Run round trip' }}
  </button>

  @if (result(); as run) {
    <div class="result" data-testid="result">
      <div class="result__row"><span class="result__key">output</span> {{ run.output }}</div>
    </div>
  }

  @if (error(); as message) {
    <div class="error-box" data-testid="error">{{ message }}</div>
  }
</section>
