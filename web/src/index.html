<!doctype html>
<!-- No hard-pinned data-theme: the brand tokens' :root is the light default (no flash for the
     common case) and ThemeService stamps the persisted theme onto <html> on boot. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LitmusAI</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Brand orange-droplet mark (2.19 W38) — matches the topbar logo; .ico is the legacy fallback. -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
